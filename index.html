  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 20px; }

  /* Header */
  header {

    position: sticky; top: 0; z-index: 20;

  .head-inner { display: flex; align-items: center; gap: 14px; padding: 14px 20px; max-width: 1080px; margin: 0 auto; }
  .logo {

  .hero p { color: var(--muted); margin: 0 auto; max-width: 640px; font-size: 15px; }

  .search-bar input {

  .chip {

  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .card {

  }
  .card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .card-head { display: flex; align-items: center; gap: 11px; }
  .card-ico {
    width: 40px; height: 40px; border-radius: 10px; flex: 0 0 auto; overflow: hidden;
    display: flex; align-items: center; justify-content: center; background: #f0f2f5;
  }
  .card-logo { width: 100%; height: 100%; object-fit: contain; padding: 6px; box-sizing: border-box; display: block; }
  .card-ico-text { display: none; font-weight: 700; font-size: 16px; color: var(--accent); }
  .card-logo[style*="display: none"] + .card-ico-text { display: flex; }
  .card-name { font-size: 16px; font-weight: 700; margin: 0; }
  .card-cat { font-size: 11.5px; color: var(--muted); }
  .card-desc { font-size: 13.5px; color: var(--muted); margin: 2px 0 0; flex: 1; }

  .card-go { font-size: 13px; color: var(--accent); font-weight: 600; display: flex; align-items: center; gap: 3px; }

  .empty { text-align: center; color: var(--muted); padding: 50px 0; grid-column: 1 / -1; }

    { name: "Llama", cat: "AI 工具", heat: 63, desc: "Meta 开源大模型，可本地免费部署。", url: "https://www.llama.com" },
    { name: "Mistral", cat: "AI 工具", heat: 62, desc: "开源高效大模型，免费权重可自部署。", url: "https://mistral.ai" },
    { name: "v0.dev", cat: "AI 工具", type: "brand", heat: 61, desc: "Vercel AI 前端生成，免费版可生成 UI 代码。", url: "https://v0.dev" },
    { name: "阶跃星辰", cat: "AI 工具", type: "brand", heat: 60, desc: "阶跃大模型，免费版可对话与多模态。", url: "https://www.stepfun.com" },
    { name: "Krea", cat: "AI 工具", type: "brand", heat: 60, desc: "AI 实时绘画与设计工具，免费版可用。", url: "https://www.krea.ai" },
    { name: "Runway", cat: "AI 工具", type: "brand", heat: 60, desc: "AI 视频生成与编辑，免费版可生成片段。", url: "https://runwayml.com" }
  ];

  // 历史条目无 heat 字段，用 HEAT 映射补齐（0-100，越高越热门）
  const HEAT = {
    "LibreOffice":86,"ONLYOFFICE":76,"Joplin":80,"Logseq":74,"LyX":60,"Zotero":78,"Calibre":82,"diagrams.net":84,"Cryptomator":70,
    "Firefox":92,"Brave":84,"Tor Browser":80,"qBittorrent":86,"Transmission":82,"Floorp":68,
    "Visual Studio Code":95,"Git":92,"Neovim":74,"Node.js":88,"VSCodium":76,"Hoppscotch":70,"DBeaver":80,"Podman":72,"Tabby":70,
    "GIMP":88,"Inkscape":84,"Krita":82,"Blender":90,"darktable":76,"RawTherapee":74,"Scribus":70,
    "VLC":98,"Audacity":86,"HandBrake":85,"OBS Studio":88,"Strawberry":72,"MPV":78,"Audacious":70,"Kdenlive":76,"Shotcut":72,
    "7-Zip":90,"PeaZip":78,"FileZilla":84,"FreeFileSync":80,"Double Commander":76,"Czkawka":70,
    "KeePass":88,"KeePassXC":86,"Bitwarden":86,"VeraCrypt":82,"GnuPG":70,"Pi-hole":72,"WireGuard":76,
    "Sumatra PDF":84,"Greenshot":84,"ShareX":85,"PDF Arranger":68,"Rclone":80,"Ventoy":84,"BleachBit":72,
    "Signal":84,"Thunderbird":78,"Element":72,"Jitsi Meet":72,"Rocket.Chat":70,"Mastodon":68,
    "LocalSend":86,"Nextcloud":83,"Floccus":70,
    "腾讯文档":85,"语雀":74,"钉钉":88,"360极速浏览器":78,"腾讯会议":87,"企业微信":84,"微信":98,"360压缩":76,"阿里云盘":84,"腾讯微云":78,"微信输入法":82,"360驱动大师":72,"360安全卫士":83,"腾讯电脑管家":80,"QQ影音":80
  };
  DATA.forEach(d => { if (d.heat == null) d.heat = HEAT[d.name] ?? 50; });
  DATA.sort((a, b) => b.heat - a.heat); // 默认按热度从高到低

  const grid = document.getElementById('grid');
  const filtersEl = document.getElementById('filters');
  const searchEl = document.getElementById('search');
  const countPill = document.getElementById('countPill');

  const cats = ["全部", ...Array.from(new Set(DATA.map(d => d.cat)))];
  let activeCat = "全部";
  let keyword = "";

  cats.forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (c === "全部" ? ' active' : '');
    chip.textContent = c;
    chip.onclick = () => {
      activeCat = c;
      document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
      chip.classList.add('active');
      render();
    };
    filtersEl.appendChild(chip);
  });

  function initials(name) {
    const clean = name.replace(/[^A-Za-z0-9一-龥]/g, '');
    return clean.slice(0, 2).toUpperCase();
  }

  function domainOf(url) {
    try { return new URL(url).hostname.replace(/^www\./, ''); } catch (e) { return ''; }
  }

  function render() {
    const kw = keyword.trim().toLowerCase();
    const list = DATA.filter(d => {
      const okCat = activeCat === "全部" || d.cat === activeCat;
      const okKw = !kw || d.name.toLowerCase().includes(kw) || d.desc.toLowerCase().includes(kw) || d.cat.toLowerCase().includes(kw);
      return okCat && okKw;
    });

    countPill.textContent = "收录 " + DATA.length + " 款 · 按热度排序";
    grid.innerHTML = "";

    if (list.length === 0) {
      grid.innerHTML = '<div class="empty">没有匹配的软件，换个关键词试试。</div>';
      return;
    }

    list.forEach(d => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = d.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = `
        <div class="card-head">
          <div class="card-ico">
            <img class="card-logo" alt="" loading="lazy" src="https://icons.duckduckgo.com/ip3/${domainOf(d.url)}.ico" onerror="if(!this.dataset.f1){this.dataset.f1=1;this.src='https://www.google.com/s2/favicons?domain=${domainOf(d.url)}&amp;sz=64';}else if(!this.dataset.f2){this.dataset.f2=1;this.src='https://favicon.im/${domainOf(d.url)}';}else{this.style.display='none';}">
            <span class="card-ico-text">${initials(d.name)}</span>
          </div>
          <div>
            <p class="card-name">${d.name}</p>
            <div class="card-cat">${d.cat}</div>
          </div>
        </div>
        <p class="card-desc">${d.desc}</p>
        <div class="card-heat">热度 ${d.heat}</div>
        <div class="card-foot">
          <span class="card-tag">${d.type === 'brand' ? '免费 · 大厂' : d.type === 'free' ? '免费' : '免费 · 开源'}</span>
          <span class="card-go">前往官网 ↗</span>
        </div>`;
      grid.appendChild(a);
    });
  }

  searchEl.addEventListener('input', e => { keyword = e.target.value; render(); });
  render();
</script>
</body>
</html>
